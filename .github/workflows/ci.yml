name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint basic Python syntax
        run: python -m py_compile Intillegent-IoT-Solutions-Case.py mysqlrepo.py

      - name: Build Docker image
        run: docker build -t iot-ek-api .
